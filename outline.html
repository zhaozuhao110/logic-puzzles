<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录大纲 — 逻辑题集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/base.css">
  <script src="assets/theme.js" defer></script>
  <script src="data/problems.js" defer></script>
  <style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#050508;
    --surface:#0c0c12;
    --card:rgba(20, 20, 30, 0.45);
    --card-hover:rgba(28, 28, 40, 0.7);
    --accent:#d4a537;
    --accent-bright:#f0c94d;
    --accent-dim:#8a6d1b;
    --cream:#e8e0d4;
    --cream-dim:#8a847a;
    --border:rgba(212, 165, 55, 0.12);
    --border-hover:rgba(212, 165, 55, 0.28);
    --tag-bg:rgba(212, 165, 55, 0.06);
    --glass-bg: rgba(12, 12, 18, 0.72);
    --bg-gradient-1: rgba(212, 165, 55, 0.05);
    --bg-gradient-2: rgba(74, 122, 223, 0.04);
  }
  [data-theme="light"]{
    --bg:#f2f4f7;
    --surface:#ffffff;
    --card:rgba(255, 255, 255, 0.86);
    --card-hover:#ffffff;
    --accent:#b08235;
    --accent-bright:#d4a537;
    --accent-dim:#8a6528;
    --cream:#1a1a1c;
    --cream-dim:#5a5a5e;
    --border:rgba(176, 130, 53, 0.15);
    --border-hover:rgba(176, 130, 53, 0.28);
    --tag-bg:rgba(176, 130, 53, 0.06);
    --glass-bg: rgba(255, 255, 255, 0.82);
    --bg-gradient-1: rgba(212, 165, 55, 0.06);
    --bg-gradient-2: rgba(74, 122, 223, 0.05);
  }
  html{scroll-behavior:smooth}
  body{
    font-family:'Noto Serif SC',serif;
    background:var(--bg);
    color:var(--cream);
    min-height:100vh;
    overflow-x:hidden;
    line-height:1.75;
  }
  .bg-layer{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 50% 40% at 20% 10%,var(--bg-gradient-1),transparent),
      radial-gradient(ellipse 40% 50% at 80% 90%,var(--bg-gradient-2),transparent),
      var(--bg);
  }
  .bg-layer::before{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity:0.02;
  }
  .container{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 28px}

  header{padding:64px 0 18px;text-align:center}
  .title{
    font-family:'Playfair Display','Noto Serif SC',serif;
    font-size:clamp(2.2rem,6vw,3.4rem);
    font-weight:900;
    background:linear-gradient(135deg,var(--accent-bright),var(--accent),var(--accent-dim));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:0.08em;line-height:1.1;margin-bottom:10px;
  }
  .subtitle{color:var(--cream-dim);font-size:0.95rem;font-weight:300;letter-spacing:0.24em;text-transform:uppercase}

  .toolbar{
    position:sticky;top:0;z-index:50;
    margin:18px -28px 24px;
    padding:12px 0;
    background:var(--glass-bg);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(212,165,55,0.08);
  }
  .toolbar-inner{
    max-width:1080px;margin:0 auto;padding:0 28px;
    display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;
  }
  .chips{display:flex;gap:10px;flex-wrap:wrap}
  .chip{
    display:inline-flex;align-items:center;gap:10px;
    padding:8px 14px;border-radius:999px;
    background:var(--tag-bg);border:1px solid var(--border);
    color:var(--cream-dim);font-size:0.86rem;cursor:pointer;
    text-decoration:none;
    transition:all .22s ease;
    letter-spacing:0.04em;
  }
  .chip:hover{border-color:var(--border-hover);color:var(--accent-bright);transform:translateY(-1px)}
  .chip.primary{background:rgba(212,165,55,0.16);color:var(--cream)}

  .back-link{
    position:fixed;left:22px;top:18px;z-index:60;
    display:inline-flex;align-items:center;gap:10px;
    padding:10px 14px;border-radius:999px;
    border:1px solid rgba(212,165,55,0.18);
    background:rgba(12,12,18,0.55);
    color:var(--cream-dim);text-decoration:none;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    transition:all .2s ease;
  }
  .back-link:hover{border-color:rgba(212,165,55,0.35);color:var(--accent-bright);transform:translateY(-1px)}
  .back-link svg{width:18px;height:18px}

  .section{margin:26px 0 22px}
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:18px;
    padding:12px 4px 10px;border-bottom:1px solid rgba(212, 165, 55, 0.08);
  }
  .section-title{
    font-family:'Playfair Display','Noto Serif SC',serif;
    font-size:1.35rem;font-weight:900;letter-spacing:0.08em;
  }
  .section-meta{color:var(--cream-dim);font-size:0.84rem;letter-spacing:0.10em;opacity:0.78}

  .bucket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:16px}
  .bucket{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 18px 14px;
    transition:all .25s ease;
  }
  .bucket:hover{border-color:var(--border-hover);background:var(--card-hover);transform:translateY(-2px)}
  .bucket h3{font-size:1rem;color:var(--cream);font-weight:900;margin-bottom:6px}
  .bucket p{font-size:0.86rem;color:var(--cream-dim);margin-bottom:10px}
  .list{display:flex;flex-direction:column;gap:8px}
  .item{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:10px 12px;border-radius:12px;
    background:rgba(0,0,0,0.16);
    border:1px solid rgba(212,165,55,0.08);
    text-decoration:none;color:inherit;
    transition:all .2s ease;
  }
  [data-theme="light"] .item{background:rgba(176,130,53,0.06)}
  .item:hover{border-color:rgba(212,165,55,0.22);transform:translateY(-1px)}
  .item .name{
    font-weight:800;color:var(--cream);line-height:1.35;
    flex:1;min-width:0;
  }
  .item .meta{
    font-size:0.78rem;color:var(--cream-dim);opacity:0.78;
    white-space:nowrap;
    flex:0 0 auto;
    text-align:right;
  }

  @media (max-width: 520px){
    .item{flex-direction:column;align-items:flex-start;gap:6px}
    .item .meta{white-space:normal;text-align:left}
  }

  footer{
    text-align:center;padding:42px 0 34px;margin-top:46px;
    color:rgba(122,116,104,0.32);font-size:0.78rem;
    border-top:1px solid rgba(201,148,62,0.06);
  }
  footer span{color:var(--accent-dim)}
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span>返回首页</span>
  </a>

  <div class="container">
    <header>
      <h1 class="title">目录大纲</h1>
      <p class="subtitle">CATALOG · BY CATEGORY & DIFFICULTY</p>
    </header>

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="chips" id="navCats"></div>
        <div class="chips">
          <a class="chip" href="#legend">难度说明</a>
        </div>
      </div>
    </div>

    <section class="section" id="legend">
      <div class="section-head">
        <div class="section-title">难度分层</div>
        <div class="section-meta">按 difficulty（1-10）分段</div>
      </div>
      <div class="bucket-grid">
        <div class="bucket">
          <h3>入门（1-3）</h3>
          <p>单点洞见，最短推理链</p>
        </div>
        <div class="bucket">
          <h3>进阶（4-6）</h3>
          <p>信息整合，多步排除</p>
        </div>
        <div class="bucket">
          <h3>挑战（7-8）</h3>
          <p>公共知识 / 分类讨论</p>
        </div>
        <div class="bucket">
          <h3>大师（9-10）</h3>
          <p>高信息量策略 / 极强结构化</p>
        </div>
      </div>
    </section>

    <div id="content"></div>

    <footer><span>&#9670;</span> 逻辑题集 &mdash; 目录大纲 <span>&#9670;</span></footer>
  </div>

  <script>
  (function(){
    var content = document.getElementById('content');
    var navCats = document.getElementById('navCats');
    var problems = [];

    var catNames = {
      'game-theory': '博弈论',
      'logic': '逻辑推理',
      'math': '数学',
      'strategy': '策略',
      'programming': '编程'
    };

    var catOrder = ['logic', 'math', 'game-theory', 'strategy', 'programming'];

    /**
     * 加载题目数据（与 index.html 同策略：优先 JSON，file:// 用 __PROBLEMS__ 兜底）。
     */
    function loadJSON() {
      var isLocal = window.location.protocol === 'file:';

      if (isLocal && window.__PROBLEMS__ && window.__PROBLEMS__.length) {
        problems = window.__PROBLEMS__;
        render();
        return;
      }

      fetch('data/problems.json').then(function(r){
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).then(function(data){
        problems = data || [];
        render();
      }).catch(function(){
        // 兜底：尝试相对路径
        fetch('./data/problems.json').then(function(r){ return r.json(); }).then(function(data){
          problems = data || [];
          render();
        }).catch(function(){
          content.innerHTML = '<div style="color:#c0392b;padding:18px 4px">无法加载题目数据，请确认 data/problems.json 存在</div>';
        });
      });
    }

    /**
     * 获取难度段信息。
     * @param {number} diff difficulty (1-10)
     * @returns {{key:string,title:string,desc:string}}
     */
    function diffBucket(diff) {
      var d = Number(diff || 5);
      if (d <= 3) return { key:'easy', title:'入门（1-3）', desc:'单点洞见，最短推理链' };
      if (d <= 6) return { key:'mid', title:'进阶（4-6）', desc:'信息整合，多步排除' };
      if (d <= 8) return { key:'hard', title:'挑战（7-8）', desc:'公共知识 / 分类讨论' };
      return { key:'master', title:'大师（9-10）', desc:'高信息量策略 / 极强结构化' };
    }

    /**
     * 生成链接列表项。
     * @param {Object} p 题目
     * @returns {string} HTML
     */
    function itemHTML(p, displayNo) {
      var diff = Number(p.difficulty || 5);
      return (
        '<a class="item" href="' + p.file + '" data-id="' + String(p.id || '') + '">' +
          '<div class="name">' + escapeHTML(p.title) + '</div>' +
          '<div class="meta">难度 ' + diff + ' · CASE #' + String(displayNo).padStart(2,'0') + ' · 原题 #' + String(p.id).padStart(2,'0') + '</div>' +
        '</a>'
      );
    }

    /**
     * HTML 转义。
     * @param {string} str 文本
     * @returns {string}
     */
    function escapeHTML(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    /**
     * 渲染目录大纲：分类分组 + 组内按难度段聚合。
     */
    function render() {
      if (!problems || !problems.length) {
        content.innerHTML = '<div style="color:#c0392b;padding:18px 4px">题目列表为空</div>';
        return;
      }

      // 按分类聚合
      var groupMap = {};
      problems.forEach(function(p){
        var c = p.category || 'logic';
        if (!groupMap[c]) groupMap[c] = [];
        groupMap[c].push(p);
      });

      // 分类顺序：预设 + 追加未知分类
      Object.keys(groupMap).forEach(function(c){
        if (catOrder.indexOf(c) === -1) catOrder.push(c);
      });

      // 顶部导航 chip
      navCats.innerHTML = '';
      catOrder.forEach(function(cat){
        if (!groupMap[cat] || !groupMap[cat].length) return;
        var a = document.createElement('a');
        a.className = 'chip primary';
        a.href = '#cat-' + cat;
        a.textContent = catNames[cat] || cat;
        navCats.appendChild(a);
      });

      // 正文：CASE 编号按“展示顺序”连续递增（与首页保持一致）
      var displayNo = 1;
      content.innerHTML = '';
      catOrder.forEach(function(cat){
        var list = groupMap[cat];
        if (!list || !list.length) return;

        // 组内按难度再按 id 排序
        list.sort(function(a,b){
          var da = Number(a.difficulty || 5);
          var db = Number(b.difficulty || 5);
          if (da !== db) return da - db;
          return Number(a.id || 0) - Number(b.id || 0);
        });

        // 按难度段分桶
        var buckets = { easy:[], mid:[], hard:[], master:[] };
        list.forEach(function(p){
          buckets[diffBucket(p.difficulty).key].push(p);
        });

        var sec = document.createElement('section');
        sec.className = 'section';
        sec.id = 'cat-' + cat;

        var head = document.createElement('div');
        head.className = 'section-head';
        head.innerHTML =
          '<div class="section-title">' + escapeHTML(catNames[cat] || cat) + '</div>' +
          '<div class="section-meta">共 ' + list.length + ' 题 · 按难度分段</div>';
        sec.appendChild(head);

        var grid = document.createElement('div');
        grid.className = 'bucket-grid';

        // 固定桶顺序
        var bucketOrder = [
          {key:'easy', title:'入门（1-3）', desc:'单点洞见，最短推理链'},
          {key:'mid', title:'进阶（4-6）', desc:'信息整合，多步排除'},
          {key:'hard', title:'挑战（7-8）', desc:'公共知识 / 分类讨论'},
          {key:'master', title:'大师（9-10）', desc:'高信息量策略 / 极强结构化'}
        ];

        bucketOrder.forEach(function(b){
          if (!buckets[b.key].length) return;
          var box = document.createElement('div');
          box.className = 'bucket';
          box.innerHTML = '<h3>' + b.title + '</h3><p>' + b.desc + ' · ' + buckets[b.key].length + ' 题</p>';

          var wrap = document.createElement('div');
          wrap.className = 'list';
          wrap.innerHTML = buckets[b.key].map(function(p){
            var html = itemHTML(p, displayNo);
            displayNo++;
            return html;
          }).join('');
          box.appendChild(wrap);

          grid.appendChild(box);
        });

        sec.appendChild(grid);
        content.appendChild(sec);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadJSON);
    } else {
      loadJSON();
    }
  })();
  </script>
</body>
</html>
